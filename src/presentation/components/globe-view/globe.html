<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Guardian Globe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000814; overflow: hidden; width: 100vw; height: 100vh; }
    #globe { width: 100%; height: 100%; }
    @keyframes beacon-pulse {
      0%   { transform: scale(1);   opacity: 0.85; }
      75%  { transform: scale(2.8); opacity: 0;    }
      100% { transform: scale(2.8); opacity: 0;    }
    }
    #overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 0.4s ease;
    }
    #sat-card {
      position: absolute;
      width: 204px;
      pointer-events: all;
      display: none;
      opacity: 0;
      transition: opacity 0.2s;
      transform: translate(-50%, calc(-100% - 8px));
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div id="globe"></div>
  <div id="overlay"></div>
  <div id="sat-card"></div>

  <!-- THREE.js loaded first so window.THREE is available for our custom lines -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
  <script>
    // ─── conjunction line config ───────────────────────────────────────────────
    var CONJUNCTION_STYLES = {
      CRITICAL: { color: '#FF3B30', baseOpacity: 0.88 },
      WARNING:  { color: '#FF9500', baseOpacity: 0.70 },
      INFO:     { color: '#FFD60A', baseOpacity: 0.52 },
    };
    var SEVERITY_RANK = { CRITICAL: 3, WARNING: 2, INFO: 1 };
    var HIGHLIGHT_COLOR   = '#FF3B30';
    var HIGHLIGHT_OPACITY = 0.95;

    // ─── coordinate transform (three-globe convention) ────────────────────────
    var GLOBE_R = 100; // globe.gl internal globe radius

    function polar2Cart(lat, lng, alt) {
      var phi   = (90 - lat) * Math.PI / 180;
      var theta = (90 + lng) * Math.PI / 180;
      var r     = GLOBE_R * (1 + alt);
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
         r * Math.cos(phi),
         r * Math.sin(phi) * Math.sin(theta)
      );
    }

    // Projects two lat/lng points through the current camera and returns the
    // screen-space bearing (CSS rotate convention: 0=up, 90=right).
    // Using NDC projection instead of geographic atan2 so arrows stay correct
    // as the globe rotates.
    function screenBearing(lat, lng, prevLat, prevLng) {
      var cam = world.camera();
      var p1  = polar2Cart(prevLat, prevLng, 0).project(cam);
      var p2  = polar2Cart(lat,     lng,     0).project(cam);
      var dx  = p2.x - p1.x;
      var dy  = p2.y - p1.y; // NDC y-up: atan2(dx, dy) → 0=up, 90=right ✓
      if (Math.abs(dx) < 1e-8 && Math.abs(dy) < 1e-8) return null;
      return Math.atan2(dx, dy) * 180 / Math.PI;
    }

    function haversineKm(lat1, lng1, lat2, lng2) {
      var R    = 6371;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLng = (lng2 - lng1) * Math.PI / 180;
      var a    = Math.sin(dLat/2)*Math.sin(dLat/2) +
                 Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
                 Math.sin(dLng/2)*Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ─── beacon element factory ───────────────────────────────────────────────
    function makeBeaconElement() {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative;width:28px;height:28px;transform:translate(-50%,-50%);pointer-events:none;';

      var ring = document.createElement('div');
      ring.style.cssText = [
        'position:absolute',
        'inset:0',
        'border-radius:50%',
        'border:2px solid rgba(0,229,255,0.75)',
        'animation:beacon-pulse 2s ease-out infinite',
      ].join(';');

      var dot = document.createElement('div');
      dot.style.cssText = [
        'position:absolute',
        'top:50%',
        'left:50%',
        'width:12px',
        'height:12px',
        'border-radius:50%',
        'background:#00E5FF',
        'box-shadow:0 0 10px #00E5FFcc,0 0 4px #fff',
        'transform:translate(-50%,-50%)',
      ].join(';');

      var inner = document.createElement('div');
      inner.style.cssText = [
        'position:absolute',
        'top:50%',
        'left:50%',
        'width:4px',
        'height:4px',
        'border-radius:50%',
        'background:#fff',
        'transform:translate(-50%,-50%)',
      ].join(';');

      dot.appendChild(inner);
      wrap.appendChild(ring);
      wrap.appendChild(dot);
      return wrap;
    }

    // ─── dot element factory ──────────────────────────────────────────────────
    function makeDotElement(d) {
      if (d.label === 'USER_BEACON') return makeBeaconElement();

      var px         = Math.round(d.radius * 20);
      var glow       = Math.round(px * 2);
      var isSelected = String(d.label) === selectedNoradId;
      var sid        = String(d.label);
      var shadow     = 'box-shadow:0 0 ' + glow + 'px ' + d.color + 'aa'
                     + (isSelected ? ',0 0 ' + (glow * 1.8) + 'px ' + d.color + '66' : '');

      // Wrapper — globe.gl positions this element; children are the dot + arrow
      var wrap = document.createElement('div');
      wrap.style.cssText = [
        'position:relative',
        'width:'  + (px + 20) + 'px',
        'height:' + (px + 20) + 'px',
        'transform:translate(-50%,-50%)',
        'cursor:pointer',
        'pointer-events:all',
        'touch-action:none',
        '-webkit-touch-callout:none',
        '-webkit-user-select:none',
        'user-select:none',
      ].join(';');

      // Dot circle
      var dot = document.createElement('div');
      dot.style.cssText = [
        'position:absolute',
        'top:50%',
        'left:50%',
        'width:'            + px + 'px',
        'height:'           + px + 'px',
        'border-radius:50%',
        'background-color:' + d.color,
        shadow,
        'transform:translate(-50%,-50%)',
        'pointer-events:none',
      ].join(';');
      wrap.appendChild(dot);

      // Directional arrow — technical mode only; uses geographic bearing so it stays
      // stable when the globe is rotated (only changes when satellite actually moves).
      if (!simpleMode && velocityAngles[sid] !== undefined) {
        var heading = velocityAngles[sid] + (correctionAngles[sid] || 0);
        var arrowDist = Math.round(px / 2) + 5;
        var arrowW    = Math.max(4, Math.round(px * 0.35));
        var arrowH    = Math.max(3, Math.round(px * 0.22));
        var arrow = document.createElement('div');
        arrow.style.cssText = [
          'position:absolute',
          'top:50%',
          'left:50%',
          'width:'  + arrowW + 'px',
          'height:' + arrowH + 'px',
          'clip-path:polygon(50% 0%,0% 100%,100% 100%)',
          'background:rgba(255,255,255,0.5)',
          'transform:translate(-50%,-50%) rotate(' + heading + 'deg) translateY(-' + arrowDist + 'px)',
          'pointer-events:none',
        ].join(';');
        wrap.appendChild(arrow);
      }

      wrap.addEventListener('touchstart', function(e) {
        e.preventDefault();
        _touchedNoradId = String(d.label);
      }, { passive: false });

      wrap.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        // Global capture touchend owns all SATELLITE_TAPPED posts via _touchedNoradId.
        // We must NOT clear it here — global capture runs first (before this fires).
      });
      return wrap;
    }

    // ─── globe setup ──────────────────────────────────────────────────────────
    var world = Globe()
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundColor('#000814')
      .atmosphereColor('#1a6ecd')
      .atmosphereAltitude(0.18)
      .htmlElementsData([])
      .htmlElement(makeDotElement)
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude('alt')
      (document.getElementById('globe'));

    world.controls().autoRotate      = true;
    world.controls().autoRotateSpeed = 0.4;
    world.controls().enableZoom      = true;
    world.controls().minDistance     = 120;
    world.controls().maxDistance     = 550;

    var resumeTimer = null;
    world.controls().addEventListener('start', function () {
      world.controls().autoRotate = false;
      clearTimeout(resumeTimer);
    });
    world.controls().addEventListener('end', function () {
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(function () { world.controls().autoRotate = true; }, 3000);
    });

    // ─── CSS3D layer reference — used to dim satellite dots when card is active ─
    // globe.gl appends the CSS3DRenderer div as the first DIV child of #globe.
    // filter: blur() would break CSS3D perspective, so only opacity is used here.
    var _htmlLayer = (function() {
      var g = document.getElementById('globe');
      if (!g) return null;
      for (var i = 0; i < g.children.length; i++) {
        if (g.children[i].tagName === 'DIV') {
          g.children[i].style.transition = 'opacity 0.22s';
          return g.children[i];
        }
      }
      return null;
    })();

    // ─── custom Three.js line layer ───────────────────────────────────────────
    // Lines are added directly to globe.gl's scene, bypassing the arc layer.
    // They connect satellite positions at orbital altitude — no surface contact.
    var lineGroup = new THREE.Group();
    world.scene().add(lineGroup);

    // ─── orbit ring layer ─────────────────────────────────────────────────────
    var orbitGroup = new THREE.Group();
    world.scene().add(orbitGroup);

    // Great-circle arc at orbital altitude using SLERP — never cuts through the globe
    function makeLine(posA, posB, color, opacity, isHighlight) {
      var SEGMENTS = 60;
      var ARC_LIFT = 0.03; // gentle outward bow at midpoint (fraction of globe radius)

      // Unit direction vectors (surface level)
      var uA = polar2Cart(posA.lat, posA.lng, 0).normalize();
      var uB = polar2Cart(posB.lat, posB.lng, 0).normalize();

      var dot   = Math.min(1, Math.max(-1, uA.dot(uB)));
      var omega = Math.acos(dot);
      var sinOm = Math.sin(omega);

      var points = [];
      for (var i = 0; i <= SEGMENTS; i++) {
        var t   = i / SEGMENTS;
        // Interpolate altitude linearly + small bow outward at midpoint
        var alt = posA.alt + (posB.alt - posA.alt) * t + ARC_LIFT * Math.sin(t * Math.PI);
        var r   = GLOBE_R * (1 + alt);

        var vec;
        if (sinOm < 1e-10) {
          vec = uA.clone().lerp(uB, t).normalize();
        } else {
          vec = uA.clone().multiplyScalar(Math.sin((1 - t) * omega) / sinOm)
                   .add(uB.clone().multiplyScalar(Math.sin(t * omega) / sinOm));
        }
        points.push(vec.multiplyScalar(r));
      }

      var geo  = new THREE.BufferGeometry().setFromPoints(points);
      var mat  = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: opacity });
      var line = new THREE.Line(geo, mat);
      line.userData.isHighlight = !!isHighlight;
      line.userData.baseOpacity = opacity;
      return line;
    }

    function rebuildLines() {
      // Dispose and clear
      while (lineGroup.children.length > 0) {
        var c = lineGroup.children[0];
        c.geometry.dispose();
        c.material.dispose();
        lineGroup.remove(c);
      }

      // Apply current pulse phase immediately so new lines don't flash on rebuild
      var _curSin = Math.sin(_pulseT);

      // Background conjunction lines — skip pairs where either satellite is corrected
      conjunctionPairs.forEach(function(pair) {
        if (correctedSatellites[String(pair.noradIdA)] || correctedSatellites[String(pair.noradIdB)]) return;
        var posA = objectsData.find(function(p) { return String(p.label) === String(pair.noradIdA); });
        var posB = objectsData.find(function(p) { return String(p.label) === String(pair.noradIdB); });
        if (!posA || !posB) return;
        var style = CONJUNCTION_STYLES[pair.severity] || CONJUNCTION_STYLES.INFO;
        var line = makeLine(posA, posB, style.color, style.baseOpacity, false);
        line.material.opacity = style.baseOpacity * (0.75 + 0.25 * _curSin);
        lineGroup.add(line);
      });

      // Highlighted line (drawn last → on top)
      if (highlightedPair) {
        var hA = objectsData.find(function(p) { return String(p.label) === String(highlightedPair.noradIdA); });
        var hB = objectsData.find(function(p) { return String(p.label) === String(highlightedPair.noradIdB); });
        if (hA && hB) {
          var hLine = makeLine(hA, hB, HIGHLIGHT_COLOR, HIGHLIGHT_OPACITY, true);
          hLine.material.opacity = 0.80 + 0.15 * _curSin;
          lineGroup.add(hLine);
        }
      }
    }

    // ─── orbit ring helpers ───────────────────────────────────────────────────
    function clearOrbit() {
      while (orbitGroup.children.length > 0) {
        var c = orbitGroup.children[0];
        c.geometry.dispose();
        c.material.dispose();
        orbitGroup.remove(c);
      }
    }

    // ─── floating satellite card ──────────────────────────────────────────────
    var CARD_I18N = {
      en: {
        typeMap: { OPERATIONAL_SATELLITE: 'OPERATIONAL', DEBRIS: 'DEBRIS', ROCKET_BODY: 'ORBITAL STAGE', ASTEROID: 'ASTEROID' },
        details: 'DETAILS ›',
        norad: 'NORAD',
      },
      pt: {
        typeMap: { OPERATIONAL_SATELLITE: 'OPERACIONAL', DEBRIS: 'DETRITO', ROCKET_BODY: 'ESTÁGIO ORBITAL', ASTEROID: 'ASTEROIDE' },
        details: 'DETALHES ›',
        norad: 'NORAD',
      },
    };

    function _esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showSatCard(data) {
      var el = document.getElementById('sat-card');
      if (!el) return;
      _satCardShown = true;
      _cardBehind   = false;
      _lastCardData  = data;
      pinnedCard    = { lat: data.lat, lng: data.lng, alt: data.alt };

      var i18n    = CARD_I18N[locale] || CARD_I18N.en;
      var altKm   = data.altKm;
      var velKms  = Math.sqrt(398600 / (6371 + altKm)).toFixed(1);
      var band    = altKm < 2000 ? 'LEO' : altKm < 35786 ? 'MEO' : 'GEO';
      var color   = data.color;
      var bg      = 'rgba(0,8,20,0.92)';
      var brd     = 'rgba(255,255,255,0.12)';
      var tLabel  = i18n.typeMap[data.satType] || i18n.typeMap.OPERATIONAL_SATELLITE;

      var badgesHtml =
        '<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;border:1px solid ' + color + '44;color:' + color + ';font-size:8px;font-weight:700;letter-spacing:0.5px;">' +
          '<span style="width:4px;height:4px;border-radius:50%;background:' + color + ';display:inline-block;flex-shrink:0;"></span>' + tLabel +
        '</span>' +
        (simpleMode ? '' :
          '<span style="padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:8px;font-weight:700;letter-spacing:0.5px;">' + band + '</span>');

      var metaHtml = simpleMode ? '' :
        '<div style="color:rgba(255,255,255,0.2);font-size:8px;letter-spacing:0.8px;margin-bottom:7px;">' + i18n.norad + ' ' + data.noradId + '</div>';

      var statsHtml = simpleMode
        ? '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:5px 8px;margin-bottom:8px;">' +
            '<span style="font-size:9px;"><span style="color:rgba(255,255,255,0.3);font-weight:600;">ALT </span><span id="sc-alt" style="color:' + color + ';font-weight:700;">' + Math.round(altKm) + ' km</span></span>' +
          '</div>'
        : '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:5px 8px;margin-bottom:8px;">' +
            '<span style="font-size:9px;"><span style="color:rgba(255,255,255,0.3);font-weight:600;">LAT </span><span id="sc-lat" style="color:' + color + ';font-weight:700;">' + Number(data.lat).toFixed(2) + '°</span></span>' +
            '<span style="font-size:9px;"><span style="color:rgba(255,255,255,0.3);font-weight:600;">LNG </span><span id="sc-lng" style="color:' + color + ';font-weight:700;">' + Number(data.lng).toFixed(2) + '°</span></span>' +
            '<span style="font-size:9px;"><span style="color:rgba(255,255,255,0.3);font-weight:600;">ALT </span><span id="sc-alt" style="color:' + color + ';font-weight:700;">' + Math.round(altKm) + ' km</span></span>' +
            '<span style="font-size:9px;"><span style="color:rgba(255,255,255,0.3);font-weight:600;">VEL </span><span id="sc-vel" style="color:' + color + ';font-weight:700;">' + velKms + ' km/s</span></span>' +
          '</div>';

      el.innerHTML =
        '<div style="height:3px;border-radius:3px 3px 0 0;background:' + color + ';margin-bottom:-1px;"></div>' +
        '<div style="background:' + bg + ';border:1px solid ' + brd + ';border-top-color:' + color + '88;border-radius:0 0 12px 12px;padding:10px 12px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:7px;">' +
            '<span style="color:#fff;font-size:12px;font-weight:800;letter-spacing:-0.2px;line-height:1.3;">' + _esc(data.name) + '</span>' +
            '<button id="sc-close" style="width:20px;height:20px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);font-size:9px;cursor:pointer;flex-shrink:0;padding:0;line-height:1;">✕</button>' +
          '</div>' +
          '<div style="display:flex;gap:4px;margin-bottom:5px;">' + badgesHtml + '</div>' +
          metaHtml +
          statsHtml +
          '<button id="sc-details" style="width:100%;height:32px;border-radius:8px;border:1px solid ' + color + '44;background:rgba(255,255,255,0.03);color:' + color + ';font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;padding:0;">' + i18n.details + '</button>' +
        '</div>' +
        '<div style="width:1px;height:8px;background:linear-gradient(' + color + '70,transparent);margin:0 auto;"></div>';

      if (_htmlLayer) _htmlLayer.style.opacity = '0.5';
      el.style.display    = 'block';
      el.style.visibility = 'visible';
      requestAnimationFrame(function() { el.style.opacity = '1'; });

      var closeBtn   = document.getElementById('sc-close');
      var detailsBtn = document.getElementById('sc-details');
      if (closeBtn) closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'SAT_CARD_CLOSE' }));
      });
      if (detailsBtn) detailsBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'SAT_CARD_OPEN_SHEET' }));
      });
    }

    function hideSatCard() {
      _satCardShown = false;
      _lastCardData  = null;
      pinnedCard    = null;
      if (_htmlLayer) _htmlLayer.style.opacity = '';
      var el = document.getElementById('sat-card');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(function() { if (!_satCardShown) el.style.display = 'none'; }, 220);
    }

    // Draws a great-circle ring at the satellite's orbital altitude.
    // The plane is determined by the satellite's position + velocity bearing.
    function drawOrbit(lat, lng, altNorm, bearingDeg, color) {
      clearOrbit();
      var r       = GLOBE_R * (1 + altNorm);
      var bRad    = bearingDeg * Math.PI / 180;
      var eps     = 1.0; // degrees — large enough for stable numerical tangent

      var posUnit  = polar2Cart(lat, lng, 0).normalize();
      var pos2Unit = polar2Cart(
        lat + Math.cos(bRad) * eps,
        lng + Math.sin(bRad) * eps,
        0
      ).normalize();
      var tangent  = pos2Unit.clone().sub(posUnit).normalize();
      var normal   = posUnit.clone().cross(tangent).normalize();
      var bX       = posUnit.clone();
      var bY       = normal.clone().cross(bX).normalize();

      var SEGMENTS = 128;
      var points   = [];
      for (var i = 0; i <= SEGMENTS; i++) {
        var a = (i / SEGMENTS) * Math.PI * 2;
        points.push(
          bX.clone().multiplyScalar(r * Math.cos(a))
            .add(bY.clone().multiplyScalar(r * Math.sin(a)))
        );
      }
      var geo = new THREE.BufferGeometry().setFromPoints(points);
      var mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.28 });
      orbitGroup.add(new THREE.Line(geo, mat));
    }

    // Breathing pulse — background lines breathe gently, highlight line glows stronger
    var _pulseT         = 0;
    var _linesFadeScale = 1; // 0→1 during fade-in; multiplied into every line opacity
    setInterval(function () {
      _pulseT += 0.04;
      var sin = Math.sin(_pulseT);
      lineGroup.children.forEach(function (line) {
        if (line.userData.isHighlight) {
          line.material.opacity = (0.80 + 0.15 * sin) * _linesFadeScale;
        } else {
          line.material.opacity = line.userData.baseOpacity * (0.75 + 0.25 * sin) * _linesFadeScale;
        }
      });
    }, 50);

    // ─── state ────────────────────────────────────────────────────────────────
    var selectedNoradId     = null;
    var objectsData         = [];
    var conjunctionPairs    = []; // all pairs ever added; never removed on correction
    var linesVisible        = false; // delayed 2 s after SET_CONJUNCTION_PAIRS to let globe settle
    var simpleMode          = false; // when true, directional arrows are hidden
    var locale              = 'en';  // 'en' | 'pt' — synced via SET_LOCALE
    var highlightedPair     = null;
    var correctedSatellites = {}; // noradId → true when satellite is manually corrected
    var prevPositions    = {};   // noradId → {lat, lng} — previous tick
    var velocityAngles   = {};   // noradId → geographic bearing — used for drawOrbit and arrows
    var correctionAngles = {};   // noradId → ±offset degrees assigned on MARK_CORRECTED
    var correctionDrift  = {};   // noradId → {dlat, dlng} static positional nudge
    var velocitySpeeds  = {}; // noradId → km/s computed from consecutive position deltas
    var activeSatModeColor = null; // non-null only for ECO/SAFE — drives orbit ring color in TÉC mode
    var userBeaconEntry    = null; // { lat, lng, alt, label, color, radius } or null
    var _touchedNoradId = null; // set on touchstart; cleared on touchend — survives element re-creation
    var _tapStartX      = 0;
    var _tapStartY      = 0;
    var TAP_MAX_DRIFT   = 15; // px — beyond this is a drag, not a tap

    // ─── satellite card state ─────────────────────────────────────────────────
    var pinnedCard    = null;  // { lat, lng, alt } — globe-space anchor for card
    var _satCardShown = false; // true while card should be visible
    var _cardBehind   = false; // cached behind-globe state to avoid redundant style writes
    var _lastCardData = null;  // last data passed to showSatCard — used to re-render on mode/locale change

    // ─── position interpolation ───────────────────────────────────────────────
    var interpFrom      = {};   // noradId → {lat,lng,alt} — visual position at last tick
    var interpTo        = {};   // noradId → {lat,lng,alt} — propagated target
    var interpStartTime = 0;
    var interpDuration  = 450; // ms — slightly under the 500 ms tick so lerp always finishes
    var interpRafId     = null;

    // ─── satellite tracking ───────────────────────────────────────────────────
    var trackedNoradId   = null;
    var trackedPosition  = null; // { lat, lng } — updated every rAF frame while tracking
    var trackingInterval = null;

    var _trackingLngOffset = 0;

    function startTracking(noradId, lat, lng, lngOffset) {
      clearInterval(trackingInterval);
      trackedNoradId  = String(noradId);
      trackedPosition = { lat: lat, lng: lng };
      _trackingLngOffset = lngOffset || 0;
      world.pointOfView({ lat: lat, lng: lng + _trackingLngOffset, altitude: 0.5 }, 300);
      trackingInterval = setInterval(function () {
        if (trackedPosition) {
          world.pointOfView({ lat: trackedPosition.lat, lng: trackedPosition.lng + _trackingLngOffset, altitude: 0.5 }, 200);
        }
      }, 50);
    }

    function stopTracking() {
      clearInterval(trackingInterval);
      trackingInterval = null;
      trackedNoradId   = null;
      trackedPosition  = null;
    }

    // Returns display color for a satellite based on its unresolved conjunction pairs.
    // A pair is unresolved if NEITHER satellite in it is corrected.
    // Returns null when the satellite has no conjunction pairs at all (use default dot color).
    // Uncontrollable bodies (DEBRIS, ASTEROID, ROCKET_BODY) are never painted — only the
    // controllable satellite in a pair receives the severity color.
    function getActiveColor(sid) {
      if (correctedSatellites[sid]) return '#34C759';

      var allPairs = conjunctionPairs.filter(function(p) {
        return String(p.noradIdA) === sid || String(p.noradIdB) === sid;
      });
      if (allPairs.length === 0) return null;

      // If this body is non-controllable in every pair it belongs to, keep its original color.
      var isUncontrollable = allPairs.every(function(p) {
        if (String(p.noradIdA) === sid) return p.satTypeA !== 'OPERATIONAL_SATELLITE';
        return p.satTypeB !== 'OPERATIONAL_SATELLITE';
      });
      if (isUncontrollable) return null;

      var unresolvedPairs = allPairs.filter(function(p) {
        return !correctedSatellites[String(p.noradIdA)] && !correctedSatellites[String(p.noradIdB)];
      });
      if (unresolvedPairs.length === 0) return '#34C759'; // all its pairs resolved

      // Highest severity — only from pairs where this sid is the controllable side.
      var maxRank = 0, color = null;
      unresolvedPairs.forEach(function(p) {
        var sidIsA = String(p.noradIdA) === sid;
        var ownType = sidIsA ? p.satTypeA : p.satTypeB;
        if (ownType !== 'OPERATIONAL_SATELLITE') return; // skip: this body is uncontrollable here
        var rank = SEVERITY_RANK[p.severity] || 1;
        if (rank > maxRank) {
          maxRank = rank;
          color = (CONJUNCTION_STYLES[p.severity] || CONJUNCTION_STYLES.INFO).color;
        }
      });
      return color;
    }

    // Repaints all dots in objectsData using getActiveColor
    function refreshDotColors() {
      objectsData = objectsData.map(function(p) {
        var sid   = String(p.label);
        var color = getActiveColor(sid) || p.originalColor;
        return Object.assign({}, p, { color: color, originalColor: color });
      });
    }

    // ─── render ───────────────────────────────────────────────────────────────
    function renderObjects() {
      world.htmlElementsData(userBeaconEntry ? objectsData.concat([userBeaconEntry]) : objectsData);
    }

    // ─── command handler ──────────────────────────────────────────────────────
    window.handleGlobeCommand = function (msg) {
      switch (msg.type) {

        case 'UPDATE_POSITIONS': {
          // 1. Velocity bearing (geographic) from position delta between ticks
          var newPrev = {};
          (msg.payload || []).forEach(function (p) {
            var sid = String(p.noradId);
            if (prevPositions[sid]) {
              var dlat = p.lat - prevPositions[sid].lat;
              var dlng = p.lng - prevPositions[sid].lng;
              if (Math.abs(dlat) > 1e-6 || Math.abs(dlng) > 1e-6) {
                velocityAngles[sid] = Math.atan2(dlng, dlat) * 180 / Math.PI;
                velocitySpeeds[sid] = haversineKm(prevPositions[sid].lat, prevPositions[sid].lng, p.lat, p.lng) / 0.5;
              }
            }
            newPrev[sid] = { lat: p.lat, lng: p.lng };
          });
          prevPositions = newPrev;

          // 2. Capture current visual positions as lerp start
          var newFrom = {};
          objectsData.forEach(function(p) {
            newFrom[String(p.label)] = { lat: p.lat, lng: p.lng, alt: p.alt };
          });

          // 3. Compute targets + build objectsData with updated style (color, radius)
          var newTo = {};
          objectsData = (msg.payload || []).map(function(p) {
            var sid       = String(p.noradId);
            var baseColor = getActiveColor(sid) || p.color;
            var isSel     = sid === selectedNoradId;
            var drift     = correctionDrift[sid];
            var lat       = p.lat + (drift ? drift.dlat : 0);
            var lng       = p.lng + (drift ? drift.dlng : 0);
            var alt       = Math.max(0.04, Math.min(p.alt * 2, 0.38));
            newTo[sid]    = { lat: lat, lng: lng, alt: alt };
            if (!newFrom[sid]) newFrom[sid] = { lat: lat, lng: lng, alt: alt }; // first tick for new satellite
            return { lat: lat, lng: lng, alt: alt, altKm: Math.round(p.alt * 6371), originalColor: baseColor, color: baseColor, radius: isSel ? 1.8 : 0.3, label: sid };
          });

          interpFrom = newFrom;
          interpTo   = newTo;

          // 4. Conjunction lines snap at tick cadence — rebuilding per-frame is too expensive
          if (linesVisible && conjunctionPairs.length > 0) rebuildLines();

          // 5. Orbit ring at tick cadence — avoids Three.js geometry thrashing at 60fps
          if (selectedNoradId && velocityAngles[selectedNoradId] !== undefined) {
            var orbitData = objectsData.find(function(p) { return String(p.label) === selectedNoradId; });
            if (orbitData) drawOrbit(orbitData.lat, orbitData.lng, orbitData.alt,
              velocityAngles[selectedNoradId] + (correctionAngles[selectedNoradId] || 0),
              activeSatModeColor || orbitData.color);
          }

          // 6. Live card updates — refresh ALT (always) and LAT/LNG/VEL (technical mode)
          if (_satCardShown && selectedNoradId) {
            var _cUpd = objectsData.find(function(p) { return String(p.label) === selectedNoradId; });
            if (_cUpd) {
              if (_lastCardData) { _lastCardData.lat = _cUpd.lat; _lastCardData.lng = _cUpd.lng; _lastCardData.altKm = _cUpd.altKm; }
              var _altEl = document.getElementById('sc-alt');
              if (_altEl) _altEl.textContent = (_cUpd.altKm || 0) + ' km';
              if (!simpleMode) {
                var _latEl = document.getElementById('sc-lat');
                var _lngEl = document.getElementById('sc-lng');
                var _velEl = document.getElementById('sc-vel');
                if (_latEl) _latEl.textContent = Number(_cUpd.lat).toFixed(2) + '°';
                if (_lngEl) _lngEl.textContent = Number(_cUpd.lng).toFixed(2) + '°';
                var _spd = velocitySpeeds[selectedNoradId];
                if (_velEl && _spd !== undefined) _velEl.textContent = _spd.toFixed(1) + ' km/s';
              }
            }
          }

          // 6. Smooth interpolation loop — lerps lat/lng/alt every frame
          if (interpRafId) cancelAnimationFrame(interpRafId);
          interpStartTime = performance.now();

          (function runInterp() {
            var elapsed = performance.now() - interpStartTime;
            var raw = Math.min(elapsed / interpDuration, 1);
            var t   = raw * raw * (3 - 2 * raw); // smoothstep

            objectsData = objectsData.map(function(p) {
              var sid  = String(p.label);
              var from = interpFrom[sid];
              var to   = interpTo[sid];
              if (!from || !to) return p;
              return Object.assign({}, p, {
                lat: from.lat + (to.lat - from.lat) * t,
                lng: from.lng + (to.lng - from.lng) * t,
                alt: from.alt + (to.alt - from.alt) * t,
              });
            });

            renderObjects();

            if (trackedNoradId) {
              var tracked = objectsData.find(function(p) { return String(p.label) === trackedNoradId; });
              if (tracked) trackedPosition = { lat: tracked.lat, lng: tracked.lng };
            }

            if (elapsed < interpDuration) {
              interpRafId = requestAnimationFrame(runInterp);
            } else {
              interpRafId = null;
            }
          })();

          break;
        }

        case 'SET_CONJUNCTION_PAIRS':
          conjunctionPairs    = msg.payload || [];
          linesVisible        = false;
          correctedSatellites = {};
          refreshDotColors();
          renderObjects();
          setTimeout(function() {
            linesVisible = true;
            _linesFadeScale = 0;
            rebuildLines();
            var _fadeStart = performance.now();
            var _fadeDur   = 600;
            (function _fade() {
              var t = Math.min((performance.now() - _fadeStart) / _fadeDur, 1);
              _linesFadeScale = t * t * (3 - 2 * t); // smoothstep
              if (t < 1) requestAnimationFrame(_fade);
            })();
          }, 2000);
          break;

        case 'ADD_CONJUNCTION_PAIR': {
          var newPair = msg.payload;
          var alreadyHas = conjunctionPairs.some(function(p) {
            return (p.noradIdA === newPair.noradIdA && p.noradIdB === newPair.noradIdB) ||
                   (p.noradIdA === newPair.noradIdB && p.noradIdB === newPair.noradIdA);
          });
          if (!alreadyHas) {
            conjunctionPairs = conjunctionPairs.concat([newPair]);
            refreshDotColors();
            renderObjects();
            rebuildLines();
          }
          break;
        }

        case 'HIGHLIGHT_CONJUNCTION': {
          var noradIdA = msg.payload.noradIdA;
          var noradIdB = msg.payload.noradIdB;
          highlightedPair = { noradIdA: noradIdA, noradIdB: noradIdB };
          objectsData = objectsData.map(function (p) {
            return String(p.label) === String(noradIdA) || String(p.label) === String(noradIdB)
              ? Object.assign({}, p, { radius: 0.6, color: '#FF3B30' })
              : p;
          });
          renderObjects();
          rebuildLines();
          break;
        }

        case 'CLEAR_HIGHLIGHT':
          highlightedPair = null;
          objectsData = objectsData.map(function (p) {
            return Object.assign({}, p, { radius: 0.3, color: p.originalColor });
          });
          renderObjects();
          rebuildLines();
          break;

        case 'DIM_GLOBE':
          document.getElementById('overlay').style.background =
            'rgba(0,0,0,' + (msg.payload.opacity != null ? msg.payload.opacity : 0.5) + ')';
          break;

        case 'UNDIM_GLOBE':
          document.getElementById('overlay').style.background = 'rgba(0,0,0,0)';
          break;

        case 'SELECT_SATELLITE':
          selectedNoradId = String(msg.payload.noradId);
          objectsData = objectsData.map(function(p) {
            if (String(p.label) === selectedNoradId) {
              return Object.assign({}, p, { radius: 1.8 });
            }
            return Object.assign({}, p, { radius: 0.15 });
          });
          renderObjects();
          break;

        case 'SHOW_SAT_CARD': {
          var _cardSid = String(msg.payload.noradId);
          var _cardDot = objectsData.find(function(p) { return String(p.label) === _cardSid; });
          if (_cardDot) {
            showSatCard({
              noradId: msg.payload.noradId,
              name:    msg.payload.name    || ('SAT-' + msg.payload.noradId),
              satType: msg.payload.satType || 'OPERATIONAL_SATELLITE',
              altKm:   msg.payload.altKm   || 400,
              lat:     _cardDot.lat,
              lng:     _cardDot.lng,
              alt:     _cardDot.alt,
              color:   _cardDot.color,
            });
            if (velocityAngles[_cardSid] !== undefined) {
              drawOrbit(_cardDot.lat, _cardDot.lng, _cardDot.alt,
                velocityAngles[_cardSid] + (correctionAngles[_cardSid] || 0),
                activeSatModeColor || _cardDot.color);
            }
          }
          break;
        }

        case 'HIDE_SAT_CARD':
          hideSatCard();
          break;

        case 'DESELECT_SATELLITE':
          hideSatCard();
          stopTracking();
          clearOrbit();
          selectedNoradId = null;
          activeSatModeColor = null;
          objectsData = objectsData.map(function(p) {
            return Object.assign({}, p, { radius: 0.3, color: p.originalColor });
          });
          renderObjects();
          break;

        case 'FOCUS_SATELLITE': {
          startTracking(msg.payload.noradId, msg.payload.lat, msg.payload.lng, msg.payload.lngOffset || 0);
          var fSid  = String(msg.payload.noradId);
          var fData = objectsData.find(function(p) { return String(p.label) === fSid; });
          if (fData && velocityAngles[fSid] !== undefined) {
            drawOrbit(msg.payload.lat, msg.payload.lng, fData.alt,
              velocityAngles[fSid] + (correctionAngles[fSid] || 0),
              activeSatModeColor || fData.color);
          }
          break;
        }

        case 'SET_SAT_MODE': {
          var modeSid = String(msg.payload.noradId);
          // NOMINAL resets to satellite's natural color; ECO/SAFE use mode color
          activeSatModeColor = msg.payload.mode !== 'NOMINAL' ? msg.payload.modeColor : null;
          if (!simpleMode && selectedNoradId === modeSid) {
            var mData = objectsData.find(function(p) { return String(p.label) === modeSid; });
            if (mData && velocityAngles[modeSid] !== undefined) {
              drawOrbit(mData.lat, mData.lng, mData.alt,
                velocityAngles[modeSid] + (correctionAngles[modeSid] || 0),
                activeSatModeColor || mData.color);
            }
          }
          break;
        }

        case 'SET_GLOBE_TEXTURE': {
          var textureMode = msg.payload.mode;
          var textureUrl = textureMode === 'light'
            ? 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'
            : 'https://unpkg.com/three-globe/example/img/earth-night.jpg';
          var atmoColor = textureMode === 'light' ? '#3a9be0' : '#1a6ecd';
          world.globeImageUrl(textureUrl);
          world.atmosphereColor(atmoColor);
          break;
        }

        case 'SET_SIMPLE_MODE':
          simpleMode = !!msg.payload.simple;
          renderObjects();
          if (_satCardShown && _lastCardData) showSatCard(_lastCardData);
          break;

        case 'SET_LOCALE':
          locale = msg.payload.locale === 'pt' ? 'pt' : 'en';
          if (_satCardShown && _lastCardData) showSatCard(_lastCardData);
          break;

        case 'SET_USER_BEACON': {
          userBeaconEntry = {
            lat: msg.payload.lat,
            lng: msg.payload.lng,
            alt: 0.0,
            label: 'USER_BEACON',
            color: '#00E5FF',
            radius: 0.3,
          };
          renderObjects();
          break;
        }

        case 'CLEAR_USER_BEACON':
          userBeaconEntry = null;
          renderObjects();
          break;

        case 'MARK_CORRECTED': {
          var correctedId = String(msg.payload.noradId);
          correctedSatellites[correctedId] = true;

          // Random direction correction ±10-20°
          var cSign = Math.random() < 0.5 ? 1 : -1;
          var cDeg  = cSign * (10 + Math.random() * 10);
          correctionAngles[correctedId] = cDeg;

          // Static positional drift: nudge the dot ~0.18° in the corrected heading
          var cBase = (velocityAngles[correctedId] || 0) + cDeg;
          var cRad  = cBase * Math.PI / 180;
          correctionDrift[correctedId] = {
            dlat: Math.cos(cRad) * 0.18,
            dlng: Math.sin(cRad) * 0.18,
          };

          // Clear highlight if it involved this satellite
          if (highlightedPair &&
              (String(highlightedPair.noradIdA) === correctedId ||
               String(highlightedPair.noradIdB) === correctedId)) {
            highlightedPair = null;
          }

          refreshDotColors();
          renderObjects();
          rebuildLines();
          break;
        }
      }
    };

    // ─── satellite card position loop ─────────────────────────────────────────
    // Projects the pinned lat/lng/alt every frame so the card moves with the globe.
    (function _cardLoop() {
      if (pinnedCard && _satCardShown) {
        var _el = document.getElementById('sat-card');
        if (_el) {
          var _cam    = world.camera();
          var _pos3   = polar2Cart(pinnedCard.lat, pinnedCard.lng, pinnedCard.alt);
          var _ndc    = _pos3.clone().project(_cam);
          // Dot-product hemisphere check: more reliable than _ndc.z > 1.
          // _ndc.z flips to large-negative (not > 1) when approaching the limb from the back,
          // causing the card to get thrown to an extreme screen position.
          var _camNorm = _cam.position.clone().normalize();
          var _satNorm = _pos3.clone().normalize();
          var _behind  = _camNorm.dot(_satNorm) < 0.0;
          if (_behind !== _cardBehind) {
            _cardBehind = _behind;
            _el.style.visibility = _behind ? 'hidden' : 'visible';
          }
          if (!_behind) {
            var _sx = (_ndc.x * 0.5 + 0.5) * window.innerWidth;
            var _sy = (-_ndc.y * 0.5 + 0.5) * window.innerHeight;
            _el.style.left = _sx + 'px';
            _el.style.top  = _sy + 'px';
          }
        }
      }
      requestAnimationFrame(_cardLoop);
    })();


    // ─── global tap detection ─────────────────────────────────────────────────
    // Capture-phase touchstart runs before any element's own touchstart.
    // Proximity check ensures _touchedNoradId is set even when renderObjects()
    // removed the satellite dot element before the touch reached it.
    window.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) { _touchedNoradId = null; return; }
      _tapStartX = e.touches[0].clientX;
      _tapStartY = e.touches[0].clientY;
      if (!objectsData.length || !world) return;
      var tx = _tapStartX, ty = _tapStartY;
      var HIT_R = 28;
      var best = null, bestDist = Infinity;
      var cam = world.camera();
      var camNorm = cam.position.clone().normalize();
      for (var i = 0; i < objectsData.length; i++) {
        var sat  = objectsData[i];
        if (sat.label === 'USER_BEACON') continue;
        var p3   = polar2Cart(sat.lat, sat.lng, sat.alt);
        if (camNorm.dot(p3.clone().normalize()) < 0) continue;
        var ndc  = p3.clone().project(cam);
        var sx   = (ndc.x * 0.5 + 0.5) * window.innerWidth;
        var sy   = (-ndc.y * 0.5 + 0.5) * window.innerHeight;
        var dist = Math.sqrt((tx - sx) * (tx - sx) + (ty - sy) * (ty - sy));
        if (dist < HIT_R && dist < bestDist) { best = String(sat.label); bestDist = dist; }
      }
      _touchedNoradId = best;
    }, { capture: true, passive: true });

    // Single owner of SATELLITE_TAPPED and outside-card close logic.
    window.addEventListener('touchend', function(e) {
      var didMove = false;
      if (e.changedTouches.length) {
        var dx = e.changedTouches[0].clientX - _tapStartX;
        var dy = e.changedTouches[0].clientY - _tapStartY;
        didMove = Math.sqrt(dx * dx + dy * dy) > TAP_MAX_DRIFT;
      }
      if (didMove) { _touchedNoradId = null; return; }

      if (_touchedNoradId) {
        var sid = _touchedNoradId;
        _touchedNoradId = null;
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'SATELLITE_TAPPED', payload: { noradId: sid },
        }));
      } else if (_satCardShown) {
        // Tap on empty area while card is open — close unless the tap landed on the card itself.
        var cardEl = document.getElementById('sat-card');
        if (cardEl && cardEl.contains(e.target)) return;
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'SAT_CARD_CLOSE',
        }));
      }
    }, { capture: true });

    window.addEventListener('touchcancel', function() {
      _touchedNoradId = null;
    }, { capture: true });

    window.addEventListener('message', function (event) {
      try {
        var msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        window.handleGlobeCommand(msg);
      } catch (_) {}
    });
  </script>
</body>
</html>

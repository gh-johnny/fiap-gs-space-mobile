<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Guardian Globe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000814; overflow: hidden; width: 100vw; height: 100vh; }
    #globe { width: 100%; height: 100%; }
    #overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="globe"></div>
  <div id="overlay"></div>

  <!-- THREE.js loaded first so window.THREE is available for our custom lines -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
  <script>
    // ─── conjunction line config ───────────────────────────────────────────────
    var CONJUNCTION_STYLES = {
      CRITICAL: { color: '#FF3B30', baseOpacity: 0.88 },
      WARNING:  { color: '#FF9500', baseOpacity: 0.70 },
      INFO:     { color: '#FFD60A', baseOpacity: 0.52 },
    };
    var SEVERITY_RANK = { CRITICAL: 3, WARNING: 2, INFO: 1 };
    var HIGHLIGHT_COLOR   = '#FF3B30';
    var HIGHLIGHT_OPACITY = 0.95;

    // ─── coordinate transform (three-globe convention) ────────────────────────
    var GLOBE_R = 100; // globe.gl internal globe radius

    function polar2Cart(lat, lng, alt) {
      var phi   = (90 - lat) * Math.PI / 180;
      var theta = (90 + lng) * Math.PI / 180;
      var r     = GLOBE_R * (1 + alt);
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
         r * Math.cos(phi),
         r * Math.sin(phi) * Math.sin(theta)
      );
    }

    // ─── dot element factory ──────────────────────────────────────────────────
    function makeDotElement(d) {
      var px         = Math.round(d.radius * 20);
      var glow       = Math.round(px * 2);
      var isSelected = String(d.label) === selectedNoradId;
      var shadow     = 'box-shadow:0 0 ' + glow + 'px ' + d.color + 'aa'
                     + (isSelected ? ',0 0 ' + (glow * 1.8) + 'px #ffffff55' : '');
      var el   = document.createElement('div');
      el.style.cssText = [
        'width:'            + px + 'px',
        'height:'           + px + 'px',
        'border-radius:50%',
        'background-color:' + d.color,
        shadow,
        'transform:translate(-50%,-50%)',
        'cursor:pointer',
        'pointer-events:all',
      ].join(';');
      function fire(e) {
        e.preventDefault();
        e.stopPropagation();
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'SATELLITE_TAPPED',
            payload: { noradId: d.label },
          }));
        }
      }
      el.addEventListener('click',    fire);
      el.addEventListener('touchend', fire);
      return el;
    }

    // ─── globe setup ──────────────────────────────────────────────────────────
    var world = Globe()
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundColor('#000814')
      .atmosphereColor('#1a6ecd')
      .atmosphereAltitude(0.18)
      .htmlElementsData([])
      .htmlElement(makeDotElement)
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude('alt')
      (document.getElementById('globe'));

    world.controls().autoRotate      = true;
    world.controls().autoRotateSpeed = 0.4;
    world.controls().enableZoom      = true;
    world.controls().minDistance     = 120;
    world.controls().maxDistance     = 550;

    var resumeTimer = null;
    world.controls().addEventListener('start', function () {
      world.controls().autoRotate = false;
      clearTimeout(resumeTimer);
    });
    world.controls().addEventListener('end', function () {
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(function () { world.controls().autoRotate = true; }, 3000);
    });

    // ─── custom Three.js line layer ───────────────────────────────────────────
    // Lines are added directly to globe.gl's scene, bypassing the arc layer.
    // They connect satellite positions at orbital altitude — no surface contact.
    var lineGroup = new THREE.Group();
    world.scene().add(lineGroup);

    // Great-circle arc at orbital altitude using SLERP — never cuts through the globe
    function makeLine(posA, posB, color, opacity, isHighlight) {
      var SEGMENTS = 60;
      var ARC_LIFT = 0.03; // gentle outward bow at midpoint (fraction of globe radius)

      // Unit direction vectors (surface level)
      var uA = polar2Cart(posA.lat, posA.lng, 0).normalize();
      var uB = polar2Cart(posB.lat, posB.lng, 0).normalize();

      var dot   = Math.min(1, Math.max(-1, uA.dot(uB)));
      var omega = Math.acos(dot);
      var sinOm = Math.sin(omega);

      var points = [];
      for (var i = 0; i <= SEGMENTS; i++) {
        var t   = i / SEGMENTS;
        // Interpolate altitude linearly + small bow outward at midpoint
        var alt = posA.alt + (posB.alt - posA.alt) * t + ARC_LIFT * Math.sin(t * Math.PI);
        var r   = GLOBE_R * (1 + alt);

        var vec;
        if (sinOm < 1e-10) {
          vec = uA.clone().lerp(uB, t).normalize();
        } else {
          vec = uA.clone().multiplyScalar(Math.sin((1 - t) * omega) / sinOm)
                   .add(uB.clone().multiplyScalar(Math.sin(t * omega) / sinOm));
        }
        points.push(vec.multiplyScalar(r));
      }

      var geo  = new THREE.BufferGeometry().setFromPoints(points);
      var mat  = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: opacity });
      var line = new THREE.Line(geo, mat);
      line.userData.isHighlight = !!isHighlight;
      line.userData.baseOpacity = opacity;
      return line;
    }

    function rebuildLines() {
      // Dispose and clear
      while (lineGroup.children.length > 0) {
        var c = lineGroup.children[0];
        c.geometry.dispose();
        c.material.dispose();
        lineGroup.remove(c);
      }

      // Background conjunction lines — skip pairs where either satellite is corrected
      conjunctionPairs.forEach(function(pair) {
        if (correctedSatellites[String(pair.noradIdA)] || correctedSatellites[String(pair.noradIdB)]) return;
        var posA = objectsData.find(function(p) { return String(p.label) === String(pair.noradIdA); });
        var posB = objectsData.find(function(p) { return String(p.label) === String(pair.noradIdB); });
        if (!posA || !posB) return;
        var style = CONJUNCTION_STYLES[pair.severity] || CONJUNCTION_STYLES.INFO;
        lineGroup.add(makeLine(posA, posB, style.color, style.baseOpacity, false));
      });

      // Highlighted line (drawn last → on top)
      if (highlightedPair) {
        var hA = objectsData.find(function(p) { return String(p.label) === String(highlightedPair.noradIdA); });
        var hB = objectsData.find(function(p) { return String(p.label) === String(highlightedPair.noradIdB); });
        if (hA && hB) {
          lineGroup.add(makeLine(hA, hB, HIGHLIGHT_COLOR, HIGHLIGHT_OPACITY, true));
        }
      }
    }

    // Breathing pulse — background lines breathe gently, highlight line glows stronger
    var _pulseT = 0;
    setInterval(function () {
      _pulseT += 0.04;
      var sin = Math.sin(_pulseT);
      lineGroup.children.forEach(function (line) {
        if (line.userData.isHighlight) {
          line.material.opacity = 0.80 + 0.15 * sin;
        } else {
          line.material.opacity = line.userData.baseOpacity * (0.75 + 0.25 * sin);
        }
      });
    }, 50);

    // ─── state ────────────────────────────────────────────────────────────────
    var selectedNoradId     = null;
    var objectsData         = [];
    var conjunctionPairs    = []; // all pairs ever added; never removed on correction
    var highlightedPair     = null;
    var correctedSatellites = {}; // noradId → true when satellite is manually corrected

    // Returns display color for a satellite based on its unresolved conjunction pairs.
    // A pair is unresolved if NEITHER satellite in it is corrected.
    // Returns null when the satellite has no conjunction pairs at all (use default dot color).
    function getActiveColor(sid) {
      if (correctedSatellites[sid]) return '#34C759';

      var allPairs = conjunctionPairs.filter(function(p) {
        return String(p.noradIdA) === sid || String(p.noradIdB) === sid;
      });
      if (allPairs.length === 0) return null;

      var unresolvedPairs = allPairs.filter(function(p) {
        return !correctedSatellites[String(p.noradIdA)] && !correctedSatellites[String(p.noradIdB)];
      });
      if (unresolvedPairs.length === 0) return '#34C759'; // all its pairs resolved

      // Highest severity among unresolved pairs
      var maxRank = 0, color = null;
      unresolvedPairs.forEach(function(p) {
        var rank = SEVERITY_RANK[p.severity] || 1;
        if (rank > maxRank) {
          maxRank = rank;
          color = (CONJUNCTION_STYLES[p.severity] || CONJUNCTION_STYLES.INFO).color;
        }
      });
      return color;
    }

    // Repaints all dots in objectsData using getActiveColor
    function refreshDotColors() {
      objectsData = objectsData.map(function(p) {
        var sid   = String(p.label);
        var color = getActiveColor(sid) || p.originalColor;
        return Object.assign({}, p, { color: color, originalColor: color });
      });
    }

    // ─── render ───────────────────────────────────────────────────────────────
    function renderObjects() {
      world.htmlElementsData(objectsData);
    }

    // ─── command handler ──────────────────────────────────────────────────────
    window.handleGlobeCommand = function (msg) {
      switch (msg.type) {

        case 'UPDATE_POSITIONS':
          objectsData = (msg.payload || []).map(function (p) {
            var sid       = String(p.noradId);
            var baseColor = getActiveColor(sid) || p.color;
            var isSel     = sid === selectedNoradId;
            return {
              lat: p.lat, lng: p.lng,
              alt: Math.max(0.04, Math.min(p.alt * 2, 0.38)),
              originalColor: baseColor,
              color:  isSel ? '#FFFFFF' : baseColor,
              radius: isSel ? 1.8 : 0.3,
              label:  sid,
            };
          });
          renderObjects();
          if (conjunctionPairs.length > 0) rebuildLines();
          break;

        case 'SET_CONJUNCTION_PAIRS':
          conjunctionPairs    = msg.payload || [];
          correctedSatellites = {};
          refreshDotColors();
          renderObjects();
          rebuildLines();
          break;

        case 'ADD_CONJUNCTION_PAIR': {
          var newPair = msg.payload;
          var alreadyHas = conjunctionPairs.some(function(p) {
            return (p.noradIdA === newPair.noradIdA && p.noradIdB === newPair.noradIdB) ||
                   (p.noradIdA === newPair.noradIdB && p.noradIdB === newPair.noradIdA);
          });
          if (!alreadyHas) {
            conjunctionPairs = conjunctionPairs.concat([newPair]);
            refreshDotColors();
            renderObjects();
            rebuildLines();
          }
          break;
        }

        case 'HIGHLIGHT_CONJUNCTION': {
          var noradIdA = msg.payload.noradIdA;
          var noradIdB = msg.payload.noradIdB;
          highlightedPair = { noradIdA: noradIdA, noradIdB: noradIdB };
          objectsData = objectsData.map(function (p) {
            return String(p.label) === String(noradIdA) || String(p.label) === String(noradIdB)
              ? Object.assign({}, p, { radius: 0.6, color: '#FF3B30' })
              : p;
          });
          renderObjects();
          rebuildLines();
          break;
        }

        case 'CLEAR_HIGHLIGHT':
          highlightedPair = null;
          objectsData = objectsData.map(function (p) {
            return Object.assign({}, p, { radius: 0.3, color: p.originalColor });
          });
          renderObjects();
          rebuildLines();
          break;

        case 'DIM_GLOBE':
          document.getElementById('overlay').style.background =
            'rgba(0,0,0,' + (msg.payload.opacity != null ? msg.payload.opacity : 0.5) + ')';
          break;

        case 'UNDIM_GLOBE':
          document.getElementById('overlay').style.background = 'rgba(0,0,0,0)';
          break;

        case 'SELECT_SATELLITE':
          selectedNoradId = String(msg.payload.noradId);
          objectsData = objectsData.map(function(p) {
            if (String(p.label) === selectedNoradId) {
              return Object.assign({}, p, { radius: 1.8, color: '#FFFFFF' });
            }
            return Object.assign({}, p, { radius: 0.15 });
          });
          renderObjects();
          break;

        case 'DESELECT_SATELLITE':
          selectedNoradId = null;
          objectsData = objectsData.map(function(p) {
            return Object.assign({}, p, { radius: 0.3, color: p.originalColor });
          });
          renderObjects();
          break;

        case 'MARK_CORRECTED': {
          var correctedId = String(msg.payload.noradId);
          correctedSatellites[correctedId] = true;

          // Clear highlight if it involved this satellite
          if (highlightedPair &&
              (String(highlightedPair.noradIdA) === correctedId ||
               String(highlightedPair.noradIdB) === correctedId)) {
            highlightedPair = null;
          }

          // Recompute all dot colors — partners may now have all their pairs resolved
          refreshDotColors();
          renderObjects();
          rebuildLines();
          break;
        }
      }
    };

    window.addEventListener('message', function (event) {
      try {
        var msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        window.handleGlobeCommand(msg);
      } catch (_) {}
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Guardian Globe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000814; overflow: hidden; width: 100vw; height: 100vh; }
    #globe { width: 100%; height: 100%; }
    #overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="globe"></div>
  <div id="overlay"></div>

  <script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
  <script>
    // ─── arc config ───────────────────────────────────────────────────────────
    var ARC_ANIM_TIME = 6000;
    var CONJUNCTION_STYLES = {
      CRITICAL: { color: '#FF3B30', stroke: 1.5, dashLen: 1.0, dashGap: 1.0, animTime: ARC_ANIM_TIME, arcAlt: 0.35 },
      WARNING:  { color: '#FF9500', stroke: 1.0, dashLen: 1.0, dashGap: 1.0, animTime: ARC_ANIM_TIME, arcAlt: 0.28 },
      INFO:     { color: '#FFD60A', stroke: 0.7, dashLen: 1.0, dashGap: 1.0, animTime: ARC_ANIM_TIME, arcAlt: 0.22 },
    };
    var ALERT_ARC = { color: '#FF3B30', stroke: 2.5, dashLen: 1.0, dashGap: 1.0, animTime: ARC_ANIM_TIME, arcAlt: 0.32 };

    // ─── dot element factory ──────────────────────────────────────────────────
    function makeDotElement(d) {
      var px   = Math.round(d.radius * 20);
      var glow = Math.round(px * 2);
      var el   = document.createElement('div');
      el.style.cssText = [
        'width:'            + px + 'px',
        'height:'           + px + 'px',
        'border-radius:50%',
        'background-color:' + d.color,
        'box-shadow:0 0 '   + glow + 'px ' + d.color + 'aa',
        'transform:translate(-50%,-50%)',
        'cursor:pointer',
        'pointer-events:all',
      ].join(';');
      function fire(e) {
        e.preventDefault();
        e.stopPropagation();
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'SATELLITE_TAPPED',
            payload: { noradId: d.label },
          }));
        }
      }
      el.addEventListener('click',    fire);
      el.addEventListener('touchend', fire);
      return el;
    }

    // ─── globe setup ──────────────────────────────────────────────────────────
    var world = Globe()
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundColor('#000814')
      .atmosphereColor('#1a6ecd')
      .atmosphereAltitude(0.18)
      .htmlElementsData([])
      .htmlElement(makeDotElement)
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude('alt')
      .arcColor('color')
      .arcStroke('stroke')
      .arcAltitude('arcAlt')
      .arcDashLength(function(d) { return d.dashLen; })
      .arcDashGap(function(d) { return d.dashGap; })
      .arcDashAnimateTime(function(d) { return d.animTime; })
      (document.getElementById('globe'));

    world.controls().autoRotate      = true;
    world.controls().autoRotateSpeed = 0.4;
    world.controls().enableZoom      = true;
    world.controls().minDistance     = 120;
    world.controls().maxDistance     = 550;

    var resumeTimer = null;
    world.controls().addEventListener('start', function () {
      world.controls().autoRotate = false;
      clearTimeout(resumeTimer);
    });
    world.controls().addEventListener('end', function () {
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(function () { world.controls().autoRotate = true; }, 3000);
    });

    // ─── state ────────────────────────────────────────────────────────────────
    var selectedNoradId  = null;
    var objectsData      = [];
    var conjunctionPairs = [];
    var backgroundArcs   = [];
    var highlightedArcs  = [];
    var highlightedPair  = null;

    // ─── render ───────────────────────────────────────────────────────────────
    function renderObjects() {
      world.htmlElementsData(objectsData);
    }

    function renderArcs() {
      world.arcsData(backgroundArcs.concat(highlightedArcs));
    }

    function buildBackgroundArcs() {
      backgroundArcs = conjunctionPairs.reduce(function (acc, pair) {
        var posA = objectsData.find(function (p) { return String(p.label) === String(pair.noradIdA); });
        var posB = objectsData.find(function (p) { return String(p.label) === String(pair.noradIdB); });
        if (posA && posB) {
          var style = CONJUNCTION_STYLES[pair.severity] || CONJUNCTION_STYLES.INFO;
          acc.push({
            startLat: posA.lat, startLng: posA.lng,
            endLat: posB.lat,   endLng: posB.lng,
            color: style.color, stroke: style.stroke, arcAlt: style.arcAlt,
            dashLen: style.dashLen, dashGap: style.dashGap, animTime: style.animTime,
          });
        }
        return acc;
      }, []);
    }

    // Fires at animTime/2 + 300ms — just into the gap phase, glitch-free arc rebuild
    setInterval(function () {
      if (conjunctionPairs.length === 0) return;
      buildBackgroundArcs();
      if (highlightedPair) {
        var hA = objectsData.find(function (p) { return String(p.label) === String(highlightedPair.noradIdA); });
        var hB = objectsData.find(function (p) { return String(p.label) === String(highlightedPair.noradIdB); });
        if (hA && hB) {
          highlightedArcs = [{
            startLat: hA.lat, startLng: hA.lng,
            endLat: hB.lat,   endLng: hB.lng,
            color: ALERT_ARC.color, stroke: ALERT_ARC.stroke, arcAlt: ALERT_ARC.arcAlt,
            dashLen: ALERT_ARC.dashLen, dashGap: ALERT_ARC.dashGap, animTime: ALERT_ARC.animTime,
          }];
        }
      }
      renderArcs();
    }, ARC_ANIM_TIME / 2 + 300);

    // ─── command handler ──────────────────────────────────────────────────────
    window.handleGlobeCommand = function (msg) {
      switch (msg.type) {

        case 'UPDATE_POSITIONS':
          objectsData = (msg.payload || []).map(function (p) {
            return {
              lat: p.lat, lng: p.lng,
              alt: Math.max(0.04, Math.min(p.alt * 2, 0.38)),
              originalColor: p.color,
              color: p.color,
              radius: 0.3,
              label: String(p.noradId),
            };
          });
          renderObjects();
          break;

        case 'SET_CONJUNCTION_PAIRS':
          conjunctionPairs = msg.payload || [];
          buildBackgroundArcs();
          renderArcs();
          break;

        case 'HIGHLIGHT_CONJUNCTION': {
          var noradIdA = msg.payload.noradIdA;
          var noradIdB = msg.payload.noradIdB;
          highlightedPair = { noradIdA: noradIdA, noradIdB: noradIdB };
          var posA = objectsData.find(function (p) { return String(p.label) === String(noradIdA); });
          var posB = objectsData.find(function (p) { return String(p.label) === String(noradIdB); });
          if (posA && posB) {
            highlightedArcs = [{
              startLat: posA.lat, startLng: posA.lng,
              endLat: posB.lat,   endLng: posB.lng,
              color: ALERT_ARC.color, stroke: ALERT_ARC.stroke, arcAlt: ALERT_ARC.arcAlt,
              dashLen: ALERT_ARC.dashLen, dashGap: ALERT_ARC.dashGap, animTime: ALERT_ARC.animTime,
            }];
            objectsData = objectsData.map(function (p) {
              return String(p.label) === String(noradIdA) || String(p.label) === String(noradIdB)
                ? Object.assign({}, p, { radius: 0.6, color: '#FF3B30' })
                : p;
            });
          }
          renderObjects();
          renderArcs();
          break;
        }

        case 'CLEAR_HIGHLIGHT':
          highlightedArcs = [];
          highlightedPair = null;
          objectsData = objectsData.map(function (p) {
            return Object.assign({}, p, { radius: 0.3, color: p.originalColor });
          });
          renderObjects();
          renderArcs();
          break;

        case 'DIM_GLOBE':
          document.getElementById('overlay').style.background =
            'rgba(0,0,0,' + (msg.payload.opacity != null ? msg.payload.opacity : 0.5) + ')';
          break;

        case 'UNDIM_GLOBE':
          document.getElementById('overlay').style.background = 'rgba(0,0,0,0)';
          break;

        case 'SELECT_SATELLITE':
          selectedNoradId = String(msg.payload.noradId);
          objectsData = objectsData.map(function(p) {
            if (String(p.label) === selectedNoradId) {
              return Object.assign({}, p, { radius: 1.2, color: '#FFFFFF' });
            }
            return Object.assign({}, p, { radius: 0.15 });
          });
          renderObjects();
          break;

        case 'DESELECT_SATELLITE':
          selectedNoradId = null;
          objectsData = objectsData.map(function(p) {
            return Object.assign({}, p, { radius: 0.3, color: p.originalColor });
          });
          renderObjects();
          break;
      }
    };

    window.addEventListener('message', function (event) {
      try {
        var msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        window.handleGlobeCommand(msg);
      } catch (_) {}
    });
  </script>
</body>
</html>
